<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ♥</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow: hidden;
    cursor: crosshair;
  }

  /* Scanlines overlay */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,255,180,0.015) 2px,
      rgba(0,255,180,0.015) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* Grid background */
  .grid-bg {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      linear-gradient(rgba(0,255,140,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,140,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
  }

  /* Glitch corners */
  .corner {
    position: fixed;
    width: 60px; height: 60px;
    border-color: #00ff8c;
    border-style: solid;
    opacity: 0.5;
    z-index: 1;
  }
  .corner-tl { top: 15px; left: 15px; border-width: 2px 0 0 2px; }
  .corner-tr { top: 15px; right: 15px; border-width: 2px 2px 0 0; }
  .corner-bl { bottom: 15px; left: 15px; border-width: 0 0 2px 2px; }
  .corner-br { bottom: 15px; right: 15px; border-width: 0 2px 2px 0; }

  /* Screens */
  .screen {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: opacity 0.8s ease;
    padding: 20px;
  }
  .screen.hidden { opacity: 0; pointer-events: none; }

  /* Intro screen */
  .intro-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(28px, 6vw, 72px);
    font-weight: 900;
    text-align: center;
    color: #fff;
    text-shadow:
      0 0 20px #ff2d78,
      0 0 40px #ff2d78,
      0 0 80px #ff2d78;
    letter-spacing: 0.1em;
    animation: flicker 4s infinite;
  }

  .intro-sub {
    font-size: clamp(10px, 2vw, 14px);
    color: #00ff8c;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-top: 12px;
    animation: blink 1.5s infinite;
  }

  .start-btn {
    margin-top: 50px;
    padding: 14px 50px;
    background: transparent;
    border: 2px solid #ff2d78;
    color: #ff2d78;
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    letter-spacing: 0.2em;
    cursor: pointer;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
  }
  .start-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,45,120,0.2), transparent);
    transition: left 0.4s;
  }
  .start-btn:hover::before { left: 100%; }
  .start-btn:hover {
    box-shadow: 0 0 20px #ff2d78, 0 0 40px #ff2d78;
    color: #fff;
    background: rgba(255,45,120,0.1);
  }

  /* Quest screen */
  .quest-box {
    border: 1px solid #00ff8c;
    padding: 40px;
    max-width: 520px;
    width: 100%;
    position: relative;
    background: rgba(0, 20, 10, 0.8);
    box-shadow: 0 0 30px rgba(0,255,140,0.15), inset 0 0 30px rgba(0,255,140,0.05);
  }
  .quest-box::before {
    content: 'QUEST_01';
    position: absolute;
    top: -12px; left: 20px;
    background: #000;
    padding: 0 10px;
    color: #00ff8c;
    font-size: 11px;
    letter-spacing: 0.3em;
  }

  .quest-question {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(13px, 2.5vw, 17px);
    color: #fff;
    text-align: center;
    line-height: 1.7;
    margin-bottom: 30px;
  }

  .quest-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 2px solid #00ff8c;
    color: #00ff8c;
    font-family: 'Share Tech Mono', monospace;
    font-size: 28px;
    text-align: center;
    padding: 10px;
    outline: none;
    letter-spacing: 0.3em;
    caret-color: #ff2d78;
  }
  .quest-input::placeholder { color: rgba(0,255,140,0.3); }

  .submit-btn {
    margin-top: 30px;
    width: 100%;
    padding: 14px;
    background: transparent;
    border: 1px solid #00ff8c;
    color: #00ff8c;
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    letter-spacing: 0.3em;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.3s;
  }
  .submit-btn:hover {
    background: rgba(0,255,140,0.1);
    box-shadow: 0 0 15px rgba(0,255,140,0.4);
  }

  .error-msg {
    color: #ff2d78;
    font-size: 12px;
    text-align: center;
    margin-top: 15px;
    letter-spacing: 0.2em;
    min-height: 18px;
    animation: shake 0.3s ease;
  }

  /* Victory screen */
  #victory-screen {
    background: #000;
  }

  canvas#heart-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 5;
  }

  .victory-center {
    position: relative;
    z-index: 20;
    text-align: center;
    pointer-events: none;
  }

  .main-word {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(36px, 8vw, 100px);
    font-weight: 900;
    color: #ff2d78;
    text-shadow:
      0 0 20px #ff2d78,
      0 0 60px #ff2d78,
      0 0 100px #ff2d78,
      0 0 200px rgba(255,45,120,0.4);
    animation: pulseGlow 2s ease-in-out infinite;
    letter-spacing: 0.05em;
  }

  .sub-word {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(12px, 2vw, 16px);
    color: rgba(255,45,120,0.7);
    letter-spacing: 0.5em;
    text-transform: uppercase;
    margin-top: 10px;
    animation: fadeInUp 1s 0.5s both;
  }

  /* GO Button */
  .go-btn {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    padding: 16px 60px;
    background: #000;
    border: 2px solid #333;
    color: #555;
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 0.4em;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.4s;
    display: none;
    text-decoration: none;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
  }
  .go-btn.visible { display: block; animation: fadeInUp 1s 2s both; }
  .go-btn:hover {
    border-color: #ff2d78;
    color: #ff2d78;
    box-shadow: 0 0 20px rgba(255,45,120,0.4), inset 0 0 20px rgba(255,45,120,0.05);
  }

  /* Particles floating text */
  .float-text {
    position: fixed;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: rgba(255, 45, 120, 0.6);
    pointer-events: none;
    z-index: 15;
    animation: floatUp linear forwards;
    white-space: nowrap;
    text-shadow: 0 0 8px #ff2d78;
  }

  /* Keyframes */
  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.6; }
    97% { opacity: 1; }
    98% { opacity: 0.4; }
    99% { opacity: 1; }
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  @keyframes pulseGlow {
    0%, 100% { text-shadow: 0 0 20px #ff2d78, 0 0 60px #ff2d78, 0 0 100px #ff2d78; }
    50% { text-shadow: 0 0 30px #ff2d78, 0 0 80px #ff2d78, 0 0 150px #ff2d78, 0 0 250px rgba(255,45,120,0.5); }
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  @keyframes floatUp {
    0% { opacity: 0; transform: translateY(0) scale(0.8); }
    20% { opacity: 1; }
    80% { opacity: 0.8; }
    100% { opacity: 0; transform: translateY(-120vh) scale(1.2); }
  }

  /* Glitch text effect */
  .glitch {
    position: relative;
  }
  .glitch::before, .glitch::after {
    content: attr(data-text);
    position: absolute;
    top: 0; left: 0;
    width: 100%;
  }
  .glitch::before {
    color: #00ffff;
    animation: glitch1 3s infinite;
    clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
  }
  .glitch::after {
    color: #ff2d78;
    animation: glitch2 3s infinite;
    clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
  }
  @keyframes glitch1 {
    0%, 90%, 100% { transform: translate(0); }
    92% { transform: translate(-3px, 1px); }
    94% { transform: translate(3px, -1px); }
    96% { transform: translate(-2px, 2px); }
  }
  @keyframes glitch2 {
    0%, 90%, 100% { transform: translate(0); }
    92% { transform: translate(3px, -1px); }
    94% { transform: translate(-3px, 1px); }
    96% { transform: translate(2px, -2px); }
  }
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<!-- INTRO SCREEN -->
<div class="screen" id="intro-screen">
  <h1 class="intro-title glitch" data-text="FOR YOU">FOR YOU</h1>
  <p class="intro-sub">// a message encrypted just for you //</p>
  <button class="start-btn" onclick="goToQuest()">ENTER</button>
</div>

<!-- QUEST SCREEN -->
<div class="screen hidden" id="quest-screen">
  <div class="quest-box">
    <p class="quest-question">
      What is the most <span style="color:#ff2d78">valuable day</span><br>
      of every month for you?<br>
      <span style="font-size:12px; color:rgba(255,255,255,0.4)">// enter the number //</span>
    </p>
    <input
      class="quest-input"
      type="number"
      id="answer-input"
      placeholder="__"
      min="1"
      max="31"
      maxlength="2"
      onkeydown="if(event.key==='Enter') checkAnswer()"
    />
    <button class="submit-btn" onclick="checkAnswer()">CONFIRM ANSWER</button>
    <p class="error-msg" id="error-msg"></p>
  </div>
</div>

<!-- VICTORY SCREEN -->
<div class="screen hidden" id="victory-screen">
  <canvas id="heart-canvas"></canvas>
  <div class="victory-center">
    <div class="main-word" id="main-word">МОTYATYA</div>
    <div class="sub-word">♥ you unlocked the secret ♥</div>
  </div>
</div>

<!-- GO BUTTON (WhatsApp) -->
<a class="go-btn" id="go-btn" href="https://wa.me/37444494444" target="_blank">GO</a>

<script>
// --- Navigation ---
function goToQuest() {
  document.getElementById('intro-screen').classList.add('hidden');
  setTimeout(() => document.getElementById('quest-screen').classList.remove('hidden'), 300);
}

function checkAnswer() {
  const val = document.getElementById('answer-input').value.trim();
  const err = document.getElementById('error-msg');
  if (val === '23') {
    err.textContent = '';
    document.getElementById('quest-screen').classList.add('hidden');
    setTimeout(() => {
      document.getElementById('victory-screen').classList.remove('hidden');
      startVictory();
    }, 400);
  } else {
    err.textContent = '> ACCESS DENIED. TRY AGAIN <';
    document.getElementById('answer-input').value = '';
  }
}

// --- Victory Animation ---
function startVictory() {
  const canvas = document.getElementById('heart-canvas');
  const ctx = canvas.getContext('2d');

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });

  // Heart shape points
  function heartPoint(t) {
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
    return { x, y };
  }

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const scale = Math.min(canvas.width, canvas.height) * 0.025;

  // Generate heart path points
  const heartPoints = [];
  for (let t = 0; t < Math.PI * 2; t += 0.05) {
    const p = heartPoint(t);
    heartPoints.push({ x: cx + p.x * scale, y: cy + p.y * scale });
  }

  // Particles
  const particles = [];
  const words = ['MOTYATYA', 'моtyatya', '♥', 'ANGEL', 'LOVE', '∞'];

  class Particle {
    constructor(type) {
      this.type = type; // 'heart' or 'angel'
      this.reset();
    }

    reset() {
      if (this.type === 'heart') {
        // Start at random heart point
        const p = heartPoints[Math.floor(Math.random() * heartPoints.length)];
        this.x = p.x + (Math.random() - 0.5) * 10;
        this.y = p.y + (Math.random() - 0.5) * 10;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = -Math.random() * 0.8 - 0.2;
        this.word = 'MOTYATYA';
        this.size = 8 + Math.random() * 6;
        this.alpha = 0;
        this.life = 0;
        this.maxLife = 200 + Math.random() * 100;
        this.color = `hsl(${330 + Math.random() * 30}, 100%, ${60 + Math.random() * 20}%)`;
      } else {
        // Angels float freely around
        this.x = Math.random() * canvas.width;
        this.y = canvas.height + 50;
        this.vx = (Math.random() - 0.5) * 1.5;
        this.vy = -Math.random() * 1.5 - 0.5;
        this.word = words[Math.floor(Math.random() * words.length)];
        this.size = 10 + Math.random() * 8;
        this.alpha = 0;
        this.life = 0;
        this.maxLife = 150 + Math.random() * 150;
        this.color = `hsl(${160 + Math.random() * 60}, 100%, ${60 + Math.random() * 30}%)`;
        this.angle = Math.random() * Math.PI * 2;
        this.angleSpeed = (Math.random() - 0.5) * 0.02;
        this.radius = 30 + Math.random() * 80;
        this.orbitX = Math.random() * canvas.width;
        this.orbitY = cy;
      }
    }

    update() {
      this.life++;
      if (this.life < 30) this.alpha = this.life / 30;
      else if (this.life > this.maxLife - 30) this.alpha = (this.maxLife - this.life) / 30;
      else this.alpha = 1;

      if (this.type === 'heart') {
        this.x += this.vx;
        this.y += this.vy;
        this.vx += (Math.random() - 0.5) * 0.05;
      } else {
        this.angle += this.angleSpeed;
        this.x = this.orbitX + Math.cos(this.angle) * this.radius;
        this.y = this.orbitY + Math.sin(this.angle) * this.radius * 0.4 - this.life * 0.3;
      }

      if (this.life >= this.maxLife) this.reset();
    }

    draw() {
      ctx.save();
      ctx.globalAlpha = this.alpha * 0.85;
      ctx.font = `${this.size}px 'Share Tech Mono', monospace`;
      ctx.fillStyle = this.color;
      ctx.shadowColor = this.color;
      ctx.shadowBlur = 12;
      ctx.fillText(this.word, this.x, this.y);
      ctx.restore();
    }
  }

  // Create particles
  for (let i = 0; i < 40; i++) particles.push(new Particle('heart'));
  for (let i = 0; i < 25; i++) particles.push(new Particle('angel'));

  // Stagger start lives
  particles.forEach((p, i) => { p.life = Math.floor(Math.random() * p.maxLife); });

  // Draw heart outline
  let heartProgress = 0;

  function drawHeartOutline(progress) {
    ctx.save();
    ctx.beginPath();
    const total = Math.floor(heartPoints.length * progress);
    for (let i = 0; i < total; i++) {
      const p = heartPoints[i];
      if (i === 0) ctx.moveTo(p.x, p.y);
      else ctx.lineTo(p.x, p.y);
    }
    ctx.strokeStyle = 'rgba(255,45,120,0.5)';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#ff2d78';
    ctx.shadowBlur = 15;
    ctx.stroke();
    ctx.restore();
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (heartProgress < 1) heartProgress += 0.005;
    drawHeartOutline(heartProgress);

    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animate);
  }

  animate();

  // Show GO button after 2 seconds
  setTimeout(() => {
    document.getElementById('go-btn').classList.add('visible');
  }, 2000);

  // Spawn floating text words
  function spawnFloater() {
    const el = document.createElement('div');
    el.className = 'float-text';
    el.textContent = ['моtyatya', 'MOTYATYA', '♥', 'angel', '∞'][Math.floor(Math.random() * 5)];
    el.style.left = Math.random() * 90 + 'vw';
    el.style.bottom = '-30px';
    el.style.fontSize = (10 + Math.random() * 14) + 'px';
    el.style.animationDuration = (6 + Math.random() * 8) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 14000);
  }

  setInterval(spawnFloater, 400);
}
</script>
</body>
</html>
